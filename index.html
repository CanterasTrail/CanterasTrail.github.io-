<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Deportivo Canteras Trail</title>
  <meta name="description" content="Club Deportivo Canteras Trail. Trail running, montaña, entrenamientos, rutas y eventos. ¡Hazte socio!" />

  <style>
    /* =========================================================
      ✅ COLORES OFICIALES (CAMBIAR AQUÍ SI QUIERES AJUSTAR)
      - Azul claro + amarillo claro
      - Cambiar solo valores hex, NO borres variables
      ========================================================= */
    :root{
      --azul: #38BDF8;        /* Azul claro principal */
      --azul-oscuro: #0B3B52; /* Contraste */
      --amarillo: #FDE047;    /* Amarillo claro acento */
      --fondo: #F6FAFE;
      --texto: #0F172A;
      --gris: #64748B;
      --blanco: #FFFFFF;
      --radio: 16px;
      --ancho: 1120px;
      --sombra: 0 10px 30px rgba(2, 6, 23, .12);
    }

    *{ box-sizing: border-box; }
    html{ scroll-behavior: smooth; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--fondo);
      color: var(--texto);
      line-height: 1.55;
    }

    /* ====== HEADER ====== */
    header{
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(15,23,42,.08);
    }

    .topbar{
      max-width: var(--ancho);
      margin: 0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 12px;
      text-decoration:none;
      color: inherit;
      min-width: 280px;
    }

    .brand-logo{
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--blanco);
      border: 2px solid rgba(0,0,0,.08);
      display:block;
    }

    .brand .name{
      display:grid;
      line-height: 1.1;
    }
    .brand strong{ font-size: 14px; }
    .brand span{ font-size: 12px; color: var(--gris); }

    nav ul{
      list-style:none;
      padding:0;
      margin:0;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    nav a{
      text-decoration:none;
      color: var(--texto);
      font-weight: 900;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 999px;
    }
    nav a:hover{
      background: rgba(56,189,248,.16);
      color: var(--azul-oscuro);
    }

    /* ====== HERO ====== */
    .hero{
      max-width: var(--ancho);
      margin: 0 auto;
      padding: 26px 18px 10px;
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
      align-items: stretch;
    }

    .hero-card{
      background: linear-gradient(135deg, rgba(56,189,248,.18), rgba(253,224,71,.22));
      border: 1px solid rgba(15,23,42,.06);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      padding: 22px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::after{
      content:"";
      position:absolute;
      top:-70px;
      right:-70px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(253,224,71,.72), rgba(253,224,71,0));
      transform: rotate(12deg);
      pointer-events:none;
    }

    .badge{
      display:inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(253,224,71,.40);
      color: #5a4700;
      font-weight: 950;
      font-size: 12px;
      width: fit-content;
    }

    .hero h1{
      margin: 10px 0 8px 0;
      font-size: clamp(24px, 3vw, 42px);
      letter-spacing: -0.02em;
    }
    .hero p{
      margin: 0 0 14px 0;
      color: rgba(15,23,42,.78);
      max-width: 68ch;
    }

    .cta-row{
      display:flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 8px;
      text-decoration:none;
      border:0;
      cursor:pointer;
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 950;
      font-size: 14px;
      user-select:none;
      transition: transform .05s ease, background .2s ease, box-shadow .2s ease;
      white-space: nowrap;
    }
    /* Botón 'Conócenos' más compacto y sin estirar */
    #btnContacto{
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 10px;
      width: fit-content;
      justify-self: start;
      align-self: start;
    }

    .btn:active{ transform: translateY(1px); }

    .btn-primary{
      background: var(--azul);
      color: #012336;
      box-shadow: 0 12px 26px rgba(56,189,248,.35);
    }
    .btn-primary:hover{ background: #24B2F6; }

    .btn-secondary{
      background: var(--blanco);
      color: var(--azul-oscuro);
      border: 1px solid rgba(2,6,23,.10);
    }
    .btn-secondary:hover{ background: rgba(255,255,255,.74); }

    .hero-side{
      background: var(--blanco);
      border: 1px solid rgba(15,23,42,.06);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      padding: 18px;
      display:grid;
      gap: 12px;
    }
    .mini{
      display:flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items:flex-start;
    }
    .mini img{
      width: 100%;
      display:block;
      height: 170px;
      border-radius: 18px;
      object-fit: cover;
      border: 1px solid rgba(15,23,42,.08);
      background: var(--blanco);
    
      flex: 0 0 100%;
    }
    

    /* Chips bajo la imagen (mantiene el texto tal cual, sin recortes) */
    .mini > div{
      flex: 1 1 100%;
      min-width: 0;
    }
.chip{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      font-size: 12px;
      font-weight: 950;
      color: rgba(15,23,42,.78);
      margin: 2px 0;
    }
    .dot{
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--azul);
      box-shadow: 0 0 0 4px rgba(56,189,248,.18);
    }

    /* ====== CONTENEDOR ====== */
    .container{
      max-width: var(--ancho);
      margin: 0 auto;
      padding: 10px 18px 40px;
    }
    .section-title{
      margin: 26px 0 10px;
      display:flex;
      justify-content:space-between;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .section-title h2{ margin:0; font-size: 20px; letter-spacing:-0.01em; }
    .section-title p{ margin:0; color: var(--gris); font-size: 13px; }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .card{
      background: var(--blanco);
      border: 1px solid rgba(15,23,42,.06);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      padding: 18px;
      display:grid;
      gap: 10px;
    }
    .card h3{ margin:0; font-size: 16px; }
    .card p{ margin:0; font-size: 13px; color: rgba(15,23,42,.72); }
    .actions{ margin-top: 6px; display:flex; gap: 10px; flex-wrap: wrap; }

    .link-mini{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 12px;
      text-decoration:none;
      font-weight: 950;
      color: var(--azul-oscuro);
      background: rgba(56,189,248,.14);
    }
    .link-mini:hover{ background: rgba(56,189,248,.22); }

    .info{
      margin-top: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(56,189,248,.08));
      border: 1px solid rgba(15,23,42,.06);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      padding: 18px;
    }
    .info ul{
      margin: 10px 0 0;
      padding-left: 18px;
      color: rgba(15,23,42,.80);
    }
    .info li{ margin: 6px 0; }

    /* ====== FOOTER ====== */
    footer{
      margin-top: 10px;
      background: #071B26;
      color: rgba(255,255,255,.88);
      padding: 24px 18px;
    }
    .footer-inner{
      max-width: var(--ancho);
      margin: 0 auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 14px;
      flex-wrap: wrap;
    }
    footer a{
      color: var(--amarillo);
      text-decoration:none;
      font-weight: 950;
    }
    footer a:hover{ text-decoration: underline; }

    /* ====== UTILIDADES ====== */
    .muted{ color: rgba(15,23,42,.68); font-size: 12px; }
    .note{
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(253,224,71,.25);
      border: 1px solid rgba(253,224,71,.45);
      font-size: 12px;
      color: rgba(15,23,42,.75);
    }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 900px){
      .hero{ grid-template-columns: 1fr; }
      .brand{ min-width: auto; }
    }
  </style>
</head>

<script>
  /* =========================================================
     ✅ SCRIPT APLICAR CONFIG (NO TOCAR)
     ---------------------------------------------------------
     Este script “rellena” la web con lo que pongas en CONFIG.
     Si alguna imagen falla, se oculta y NO rompe el layout.
     ========================================================= */
  const $ = (id) => document.getElementById(id);

  // Placeholder logo (SVG) por si no hay URL o falla
  const LOGO_PLACEHOLDER = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
      <defs>
        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0" stop-color="${getComputedStyle(document.documentElement).getPropertyValue('--azul').trim() || '#38BDF8'}"/>
          <stop offset="1" stop-color="${getComputedStyle(document.documentElement).getPropertyValue('--amarillo').trim() || '#FDE047'}"/>
        </linearGradient>
      </defs>
      <circle cx="48" cy="48" r="46" fill="url(#g)" stroke="rgba(0,0,0,.12)" stroke-width="2"/>
      <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle"
            font-family="Arial" font-size="18" font-weight="800" fill="rgba(2,6,23,.85)">
        CT
      </text>
    </svg>
  `);

  function safeSetLink(el, url){
    // Si url es vacío o "#", dejamos "#" para no romper
    el.href = (url && url.trim()) ? url.trim() : "#";
  }

  function safeSetImg(imgEl, url, fallbackDataUri, hideIfFail = true){
    const u = (url || "").trim();
    if (!u || u === "#") {
      imgEl.src = fallbackDataUri;
      return;
    }
    imgEl.src = u;
    imgEl.addEventListener("error", () => {
      if (hideIfFail) {
        imgEl.style.display = "none";
      } else {
        imgEl.src = fallbackDataUri;
      }
    }, { once: true });
  }

  // Textos del club
  $("clubNombre").textContent = CONFIG.club.nombre;
  $("clubSlogan").textContent = CONFIG.club.slogan;
  $("badge").textContent = CONFIG.club.badge;

  // Logo: si no pones OneDrive, usa placeholder bonito sin romper
  safeSetImg($("logoImg"), CONFIG.imagenes.logoUrl, LOGO_PLACEHOLDER, false);

  // Hero textos
  $("heroTitulo").textContent = CONFIG.hero.titulo;
  $("heroDesc").textContent = CONFIG.hero.descripcion;
  $("chip1").textContent = (CONFIG.hero.chips && CONFIG.hero.chips[0]) ? CONFIG.hero.chips[0] : "";
  $("chip2").textContent = (CONFIG.hero.chips && CONFIG.hero.chips[1]) ? CONFIG.hero.chips[1] : "";
  $("chip3").textContent = (CONFIG.hero.chips && CONFIG.hero.chips[2]) ? CONFIG.hero.chips[2] : "";
  $("heroLateral").textContent = CONFIG.hero.textoLateral;

  // Enlaces hero
  safeSetLink($("btnSocio"), CONFIG.enlaces.hazteSocio);
  safeSetLink($("btnCalendario"), CONFIG.enlaces.calendario);
  safeSetLink($("btnContacto"), CONFIG.enlaces.contactoRapido);

  // Imagen portada (hero): si falla, se oculta sin afectar el diseño
  safeSetImg($("heroImg"), CONFIG.imagenes.heroUrl, "", true);
  if (!(CONFIG.imagenes.heroUrl && CONFIG.imagenes.heroUrl.trim() && CONFIG.imagenes.heroUrl.trim() !== "#")) {
    $("heroImg").style.display = "none";
  }

  // Tarjetas textos
  $("tActTitulo").textContent = CONFIG.tarjetas.actividades.titulo;
  $("tActDesc").textContent = CONFIG.tarjetas.actividades.descripcion;
  $("tActBtn").textContent = CONFIG.tarjetas.actividades.boton;

  $("tLigaTitulo").textContent = CONFIG.tarjetas.liga.titulo;
  $("tLigaDesc").textContent = CONFIG.tarjetas.liga.descripcion;
  $("tLigaBtn").textContent = CONFIG.tarjetas.liga.boton;

  $("tEqTitulo").textContent = CONFIG.tarjetas.equipacion.titulo;
  $("tEqDesc").textContent = CONFIG.tarjetas.equipacion.descripcion;
  $("tEqBtn1").textContent = CONFIG.tarjetas.equipacion.boton1;
  $("tEqBtn2").textContent = CONFIG.tarjetas.equipacion.boton2;

  // Tarjetas enlaces
  safeSetLink($("tActBtn"), CONFIG.enlaces.actividades);
  safeSetLink($("tLigaBtn"), CONFIG.enlaces.liga);
  safeSetLink($("tEqBtn1"), CONFIG.enlaces.equipacionCatalogo);
  safeSetLink($("tEqBtn2"), CONFIG.enlaces.equipacionPedido);

  // Socios
  $("socTitulo").textContent = CONFIG.socios.titulo;
  $("socDesc").textContent = CONFIG.socios.descripcion;
  $("socBtnZona").textContent = CONFIG.socios.btnZona;
  const __socAlta = $("socBtnAlta");
  if (__socAlta) {
    __socAlta.textContent = CONFIG.socios.btnAlta;
  }
safeSetLink($("socBtnZona"), CONFIG.enlaces.zonaSocios);
  if (__socAlta) {
    safeSetLink(__socAlta, CONFIG.enlaces.hazteSocio);
  }
const ul = $("socBeneficios");
  ul.innerHTML = "";
  (CONFIG.socios.beneficios || []).forEach(txt => {
    const li = document.createElement("li");
    li.textContent = txt;
    ul.appendChild(li);
  });

  // Footer
  $("footerLegal").textContent = CONFIG.footer.legal;
  $("footerUbicacion").textContent = CONFIG.footer.ubicacion;

  safeSetLink($("fInstagram"), CONFIG.enlaces.instagram);
  safeSetLink($("fFacebook"), CONFIG.enlaces.facebook);
  safeSetLink($("fEmail"), CONFIG.enlaces.email);
</script>

</body>
</html>
